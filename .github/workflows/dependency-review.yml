name: Dependency Review
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4.2.2
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        continue-on-error: true
