name: CI

on:
  push:
    branches:
      - prod-fe
      - dev-fe
  pull_request:
    branches:
      - prod-fe
      - dev-fe
  workflow_dispatch: # Added to allow manual operational execution

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/prod-fe' }}

env:
  NODE_VERSION: '22.x'
  PNPM_VERSION: '9.15.0'

permissions:
  contents: read

jobs:
  static-analysis:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        timeout-minutes: 5

      - run: pnpm run check:secrets

      # CRITICAL FIX: Removed the fallback echo to ensure pipeline fails on bad types
      - name: Run Typecheck
        run: pnpm run typecheck

      # Note: Includes github.sha to intentionally cause a primary key miss,
      # forcing actions/cache to save the updated incremental cache post-run.
      - name: Restore ESLint Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .eslintcache
          key: eslintcache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            eslintcache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm audit --prod --audit-level=high

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            -r
            .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # HIGH PRIORITY FIX: Removed needs: static-analysis to allow parallel execution
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test:ci

      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build & Artifact Validation
    runs-on: ubuntu-latest
    # HIGH PRIORITY FIX: Removed needs: static-analysis
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Note: Includes github.sha to facilitate incremental Vite caching
      - name: Restore Vite Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules/.vite
          key: vitecache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            vitecache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Validate Environment Config
        run: pnpm run check:env
        env:
          CI: true
          VITE_API_BASE_URL: 'https://api.dummy.local'
          VITE_ENV: ci
          VITE_REQUEST_KEY: 'dummy-key'

      # HIGH PRIORITY FIX: Provide runtime placeholders instead of baking PROD secrets into CI builds
      - name: Build application
        run: pnpm run build
        env:
          CI: true
          VITE_API_BASE_URL: '__API_URL_PLACEHOLDER__'
          VITE_ENV: '__ENV_PLACEHOLDER__'
          VITE_REQUEST_KEY: '__REQUEST_KEY_PLACEHOLDER__'

      - run: pnpm run check:bundle

      - name: Generate Build Provenance (SLSA Level 3)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: 'dist/'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist-artifact
          path: dist/
          retention-days: 7

  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist-artifact
          path: dist/

      - run: pnpm run lighthouse

  ci-success:
    name: CI Success (Gatekeeper)
    runs-on: ubuntu-latest
    if: always()
    needs: [static-analysis, test, build, lighthouse]
    steps:
      - name: Check workflow status
        # Evaluates failure or cancellation. Removes 'skipped' to allow future conditional path filtering.
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::One or more required jobs failed or were cancelled."
          exit 1

      - name: Gate Success
        run: echo "All checks passed successfully!"
