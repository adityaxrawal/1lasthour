name: Production Preflight Gate

on:
  push:
    branches: [dev-be, prod-be]
  pull_request:
    branches: [dev-be, prod-be]

concurrency:
  group: preflight-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/prod-be' }}

# Default to strictly no permissions
permissions: {}

env:
  NODE_VERSION: 22.14.0 # Pinned for determinism

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # Required for checkout
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: 9
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm run format:check
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck:build
      - name: Circular Dependencies
        run: pnpm run check:circular

  security-and-tests:
    name: Security & Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # PostgreSQL properly initialized for isolated testing
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: 9
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load Environment Variables
        run: cp .env.example .env.test # Best practice: load from a fixture file, not pipeline vars

      - name: Dependency Integrity & OSV Scan
        run: pnpm run check:deps

      - name: Secret Scanning
        run: pnpm run check:secrets

      - name: Tests
        run: pnpm run test:ci
        env:
          DATABASE_URL: postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_db

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: 9
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load Environment Variables
        run: cp .env.example .env

      - name: Build
        run: pnpm run build:clean

      - name: Build Verification
        run: pnpm run build:verify

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file dist/sbom.json

      - name: Upload Production Artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: production-build
          path: dist/
          retention-days: 7

  gate-passed:
    name: Pre-Production Gate Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [quality, security-and-tests, build]
    permissions: {}
    steps:
      - name: Verify All Dependencies Succeeded
        # Ensures that if any job fails, is cancelled, OR IS SKIPPED, the gate fails.
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "::error::Gate Failed! One or more preflight checks failed or were unexpectedly skipped."
          exit 1
      - name: Gate Success
        run: echo "All preflight checks explicitly passed. Safe to deploy."
