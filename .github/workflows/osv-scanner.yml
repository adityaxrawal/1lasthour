name: OSV-Scanner

on:
  push:
    branches: [ "dev-be", "prod-be" ]
  pull_request:
    branches: [ "dev-be", "prod-be" ]
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  scan:
    name: Run OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1.9.1
        with:
          scan-args: |-
            -r
            --lockfile=pnpm-lock.yaml
