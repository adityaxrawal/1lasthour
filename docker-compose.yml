version: "3.9"

services:
  backend:
    build: 
      context: .
      target: builder 
    command: npm run dev
    ports: 
      - "3000:3000"
    volumes: 
      - "./src:/app/src"
      - "./scripts:/app/scripts"
      - "./drizzle:/app/drizzle"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://lasthour_user:password@postgres:5432/lasthour
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:1223,http://localhost:5173
      ALLOWED_ORIGIN: http://localhost:1223
      LOG_LEVEL: debug
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-CHANGE_ME_generate_with_openssl_rand_hex_32}
      IP_SALT: ${IP_SALT:-CHANGE_ME_generate_with_openssl_rand_hex_16}
      REQUEST_SECRET: ${REQUEST_SECRET:-CHANGE_ME_generate_with_openssl_rand_hex_32}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lasthour
      POSTGRES_USER: lasthour_user
      POSTGRES_PASSWORD: password
    ports: 
      - "5432:5432"
    volumes: 
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lasthour_user -d lasthour"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: 
      - "6379:6379"
    volumes: 
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer
    ports: 
      - "8080:8080"
    depends_on: 
      - postgres

volumes:
  pg_data:
  redis_data:
